name: continuous_integration
on:
  push:
  pull_request:


jobs:
    quality-backend:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'npm'

        - name: install dependencies
          run: make install-backend-dependencies

        - name: install lint
          run: make start-eslint-backend

        - run: make hello

    quality-frontend:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'npm'

        - name: install dependencies
          run: make install-frontend-dependencies

        - name: install lint
          run: make start-eslint-frontend

        - run: make hello

    test:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'npm'

        - name: install dependencies
          run: make install-backend-dependencies
          run: make install-frontend-dependencies

        - name: test backend
          run: make test-backend

        - name: test frontend
          run: make test-frontend