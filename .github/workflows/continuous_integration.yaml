name: continuous_integration
on:
  push:
  pull_request:


jobs:
    quality:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: 'npm'

        - name: Install dependencies
          run: make install

        - name: install lint
          run: make start-eslint-backend

        - run: make hello